# Deploy to Cloudflare Workers static assets. Three triggers:
# push to main, daily scheduled rebuild (keeps the
# sprint day counter honest), manual dispatch.
# Requires repo secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
# Optional repo variables: SITE_ORIGIN (set at domain cutover), PUBLIC_CONTACT_EMAIL.
name: deploy

permissions:
  contents: read

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 9 * * *' # daily rebuild
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test
      - run: pnpm build
        env:
          PUBLIC_CONTACT_EMAIL: ${{ vars.PUBLIC_CONTACT_EMAIL }}
          SITE_ORIGIN: ${{ vars.SITE_ORIGIN }}
      - run: pnpm test:dist
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
